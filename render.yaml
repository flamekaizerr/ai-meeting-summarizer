services:
  - type: web
    name: ai-meeting-summarizer-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: 25
      - key: ALLOWED_AUDIO_EXTENSIONS
        value: '[".mp3",".wav",".m4a",".ogg",".webm",".mp4"]'
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: meeting-audio
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TRANSCRIPTION_MODEL
        value: whisper-large-v3-turbo
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_SUMMARY_MODEL
        value: google/gemma-4-31b-it:free
